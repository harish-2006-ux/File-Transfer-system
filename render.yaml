services:
  # Flask Backend
  - type: web
    name: vaultx-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: SECRET_KEY
        generateValue: true
      - key: ENCRYPTION_KEY
        generateValue: true
      - key: DATABASE_TYPE
        value: sqlite
      - key: DEBUG
        value: False
      - key: MAX_CONTENT_LENGTH
        value: 10485760
      - key: SENDER_EMAIL
        sync: false
      - key: SENDER_PASSWORD
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
    disk:
      name: vaultx-data
      mountPath: /opt/render/project/src/server_files
      sizeGB: 1
