{% extends "base.html" %}

{% block title %}Login - VaultX{% endblock %}

{% block content %}
<h2>🔐 VaultX Login</h2>
<p style="text-align: center; color: #666; margin-bottom: 2rem;">
    Secure file transfer with end-to-end encryption
</p>

<form method="POST">
    <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" required>
    </div>
    
    <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" required>
    </div>
    
    <button type="submit" class="btn">Login</button>
</form>

<div class="nav-links">
    <a href="{{ url_for('signup') }}">Create Account</a>
</div>

<div style="margin-top: 2rem; padding: 1rem; background: #f8f9fa; border-radius: 8px; font-size: 0.9rem; color: #666;">
    <strong>Test Account:</strong><br>
    Username: testuser<br>
    Password: Test123!
</div>
{% endblock %}
